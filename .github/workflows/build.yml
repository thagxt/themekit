name: Build Theme Kit

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build Theme Kit for macOS
        run: |
          GOOS=darwin GOARCH=arm64 go build -o themekit ./cmd/theme

      - name: Upload Binary
        uses: actions/upload-artifact@v3
        with:
          name: themekit-macos
          path: themekit
