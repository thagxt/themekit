name: Build Theme Kit

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Bundle static assets
        run: go run src/static/cmd/bundle.go

      - name: Build Theme Kit for macOS (Apple Silicon)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o themekit ./cmd/theme

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: themekit-macos-arm64
          path: themekit
